<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>my notes</title>
<meta name="description" content="Kevin's personal notes on physics and math — cross-linked, growing, wandered rather than read." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">

<link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app">

  <div class="mobile-bar">
    <button id="menuToggle" class="icon-btn" aria-label="Toggle navigation">
      <svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
    <a href="#/" class="mobile-title">my notes</a>
    <button id="mobileSearchToggle" class="icon-btn" aria-label="Search">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    </button>
  </div>

  <aside id="sidebar" class="sidebar">
    <a href="#/" class="brand">
      <span class="brand-text">my notes</span>
    </a>

    <div class="search-box">
      <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="searchInput" type="text" placeholder="Search the garden  /" autocomplete="off" />
      <div id="searchResults" class="search-results hidden"></div>
    </div>

    <nav id="navTree" class="nav-tree"></nav>

    <div class="sidebar-footer">
      <div id="statsLine" class="stats-line"></div>
      <button id="wanderBtn" class="wander-btn">🎲 wander the garden</button>
    </div>
  </aside>

  <div id="sidebarScrim" class="sidebar-scrim"></div>

  <main id="main" class="main">
    <div id="view" class="view"></div>
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
